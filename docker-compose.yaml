# Docker Compose deployment for Airflow 3 + MLflow
# Usage: docker compose up -d
# Airflow UI : http://localhost:8080  (admin / admin)
# MLflow  UI : http://localhost:5001

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file: .env
  environment:
    # Database
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Core
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW_HOME: /opt/airflow
    # MLflow — use service name so containers can reach each other
    MLFLOW_TRACKING_URI: http://mlflow:5001
    # mini-swe-agent cost tracking
    MSWEA_COST_TRACKING: ignore_errors
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./runs:/opt/airflow/runs
    - ./mini-swe-agent:/opt/airflow/mini-swe-agent
    - airflow-logs:/opt/airflow/logs
    - airflow-home:/opt/airflow
    # Share host Docker socket so SWE-bench eval can spin up containers
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Metadata DB ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  # ── Airflow bootstrap (runs once then exits) ─────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        echo '{"admin": "admin"}' > /opt/airflow/simple_auth_manager_passwords.json.generated &&
        echo "Airflow initialized. Login: admin / admin"
    restart: "no"

  # ── Airflow scheduler (also executes tasks with LocalExecutor) ───────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow API server (UI + REST API) ──────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/version"]
      interval: 30s
      retries: 5

  # ── MLflow tracking server ───────────────────────────────────────────────────
  mlflow:
    image: python:3.12-slim
    command: ["bash", "-c", "pip install --quiet mlflow==2.22.1 && mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts"]
    ports:
      - "5001:5001"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      retries: 5

volumes:
  postgres-data:
  airflow-logs:
  airflow-home:
  mlflow-data: